name: Bug report
description: Report a reproducible problem without including sensitive data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Do not include API keys, certificates, tokens, exact locations, search history, or personal information."
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use a non-sensitive example location or describe the flow without coordinates.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Chrome version, operating system, and project commit/version.
