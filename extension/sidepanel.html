<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="extensionName"></title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="panel">
      <section class="controls">
        <div class="mode-bar">
          <h1 id="modeTitle" class="mode-title"></h1>
          <button id="modeToggleButton" class="mode-toggle-button" type="button">
            <span id="modeToggleIcon" aria-hidden="true"></span>
          </button>
        </div>
        <div id="backendNotice" class="backend-notice" hidden>
          <span data-i18n="backendOffline"></span>
          <a href="https://github.com/kuan83/nearby-lunch-extension#quick-setup-for-windows" target="_blank" rel="noreferrer" data-i18n="setupGuide"></a>
          <button id="healthRetryButton" type="button" data-i18n="retryCheck"></button>
        </div>
        <div id="filterPanel" class="filter-panel">
          <p class="location-disclosure" data-i18n="locationDisclosure"></p>
          <div class="control-group">
            <p class="control-label" data-i18n="budget"></p>
            <div class="price-filter" role="group" data-i18n-aria-label="ariaBudget">
              <button class="price-option active" type="button" data-price-range="all" data-i18n="priceAll"></button>
              <button class="price-option" type="button" data-price-range="1_100">1-100</button>
              <button class="price-option" type="button" data-price-range="101_500">101-500</button>
              <button class="price-option" type="button" data-price-range="501_1000">501-1000</button>
              <button class="price-option" type="button" data-price-range="1001_2000">1001-2000</button>
              <button class="price-option" type="button" data-price-range="2000_up" data-i18n="priceOver2000"></button>
            </div>
          </div>
          <div class="control-group">
            <p class="control-label" data-i18n="foodType"></p>
            <div class="type-filter" role="group" data-i18n-aria-label="ariaFoodType">
              <button class="type-option active" type="button" data-food-slot="0"></button>
              <button class="type-option active" type="button" data-food-slot="1"></button>
              <button class="type-option active" type="button" data-food-slot="2"></button>
              <button class="type-option active" type="button" data-food-slot="3"></button>
              <button class="type-option active" type="button" data-food-slot="4"></button>
              <button class="type-option active" type="button" data-food-slot="5"></button>
            </div>
          </div>
        </div>
        <div class="actions">
          <button id="recommendButton" class="primary-button" type="button" data-i18n="startLunch"></button>
          <button id="filterToggleButton" class="filter-toggle-button" type="button" aria-expanded="false" hidden data-i18n="filterConditions"></button>
          <button id="refreshButton" class="refresh-button" type="button" hidden data-i18n="refresh"></button>
        </div>
        <p id="status" class="status" role="status"></p>
        <p id="metaStatus" class="meta-status"></p>
        <div id="placesAttribution" class="places-attribution" hidden>
          <span translate="no">Google Maps</span>
          <button id="rankingInfoButton" type="button" data-i18n="rankingInfo"></button>
        </div>
        <p id="rankingNotice" class="ranking-notice" hidden data-i18n="rankingNotice"></p>
      </section>
      <section id="results" class="results" data-i18n-aria-label="resultsLabel"></section>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
